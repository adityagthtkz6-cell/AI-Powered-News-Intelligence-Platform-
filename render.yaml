services:
  - type: web
    name: newsiq-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: NEWSDATA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./news_intelligence.db
      - key: FETCH_INTERVAL_MINUTES
        value: 30
      - key: NEWS_CATEGORIES
        value: technology,business,science,health
      - key: NEWS_LANGUAGE
        value: en
      - key: MAX_ARTICLES_PER_FETCH
        value: 50
